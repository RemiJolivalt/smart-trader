# Labels standards Smart Trader
# Importer via: gh label create -f infra/github/labels.yml
# (ou GitHub Action existante type "EndBug/label-sync")

- name: frontend
  color: "1f77b4"
  description: "Concerne le code frontend (Next.js)"

- name: backend
  color: "2ca02c"
  description: "Concerne le code backend (FastAPI)"

- name: infra
  color: "8c564b"
  description: "CI/CD, hébergement, IaC, monitoring"

- name: bug
  color: "d62728"
  description: "Dysfonctionnement à corriger"

- name: feature
  color: "9467bd"
  description: "Nouvelle fonctionnalité utilisateur"

- name: security
  color: "b91d1d"
  description: "Sécurité, secrets, conformité"

- name: high-priority
  color: "e11d48"
