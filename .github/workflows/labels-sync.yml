name: Sync labels

on:
  push:
    branches: [main]
    paths:
      - 'infra/github/labels.yml'
      - '.github/workflows/labels-sync.yml'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EndBug/label-sync@v2
        with:
          config-file: infra/github/labels.yml
          delete-other-labels: false
