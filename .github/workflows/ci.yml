name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' && hashFiles('frontend/pnpm-lock.yaml') != ''
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm', cache-dependency-path: frontend/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test -- --run
      - run: pnpm build

  backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' && hashFiles('backend/pyproject.toml') != ''
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install uv
        run: pip install uv
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install gitleaks
        run: |
          VERSION="v8.27.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan secrets
        run: gitleaks detect --config .gitleaks.toml --source . --redact

  ci-status:
    needs: [frontend, backend, security]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Block merge if any required job failed
        run: |
          if [[ "${{ needs.frontend.result }}"  == "failure"   || "${{ needs.frontend.result }}"  == "cancelled" || \
                "${{ needs.backend.result }}"   == "failure"   || "${{ needs.backend.result }}"   == "cancelled" || \
                "${{ needs.security.result }}"  == "failure"   || "${{ needs.security.result }}"  == "cancelled" ]]; then
            echo "CI failed or cancelled — merge blocked."
            exit 1
          fi
          echo "CI passed ✓"
